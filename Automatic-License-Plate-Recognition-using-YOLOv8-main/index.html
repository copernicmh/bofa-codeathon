<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>SGA Live Dashboard</title>
</head>
<body class="bg-[#020c1b] text-slate-300 p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-slate-800 pb-5">
            <div>
                <h1 class="text-2xl font-bold text-[#64ffda] tracking-widest uppercase">Smart Gate Access</h1>
                <p class="text-xs text-slate-500 mt-1">Hampton University Security Ops</p>
            </div>
            <div class="text-right font-mono text-sm">
                <span class="text-green-400">● SYSTEM ONLINE</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="rounded-xl overflow-hidden border border-slate-800 bg-black shadow-2xl">
                    <div class="bg-[#0a192f] p-3 border-b border-slate-800 flex justify-between items-center">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-[#64ffda]">Live Feed: North Gate</span>
                        <span class="text-[10px] text-red-500 animate-pulse font-bold">REC</span>
                    </div>
                    <img src="http://localhost:8000/video_feed" class="w-full h-auto" alt="Gate Stream">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-[#0a192f] p-5 rounded-lg border border-slate-800">
                        <p class="text-[10px] text-slate-500 uppercase font-bold">Total Scans Today</p>
                        <p id="total-count" class="text-3xl font-mono text-white mt-1">0</p>
                    </div>
                    <div class="bg-[#0a192f] p-5 rounded-lg border border-slate-800">
                        <p class="text-[10px] text-slate-500 uppercase font-bold">Risk Alerts</p>
                        <p id="alert-count" class="text-3xl font-mono text-red-400 mt-1">0</p>
                    </div>
                </div>
            </div>

            <div class="bg-[#0a192f] rounded-xl border border-slate-800 flex flex-col h-[600px] lg:h-auto">
                <div class="p-4 border-b border-slate-800 bg-[#112240]">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-[#64ffda]">Access History</h2>
                </div>
                
                <div class="overflow-y-auto flex-grow custom-scrollbar">
                    <table class="w-full text-left">
                        <tbody id="log-table" class="divide-y divide-slate-800">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        async function refreshLogs() {
            try {
                const res = await fetch('http://localhost:8000/logs');
                const data = await res.json();
                
                document.getElementById('total-count').innerText = data.length;
                let alerts = data.filter(l => l.risk > 50).length;
                document.getElementById('alert-count').innerText = alerts;

                const table = document.getElementById('log-table');
                table.innerHTML = data.map(log => `
                    <tr class="hover:bg-[#112240] transition-colors">
                        <td class="p-4">
                            <div class="text-white font-mono font-bold">${log.plate}</div>
                            <div class="text-[10px] text-slate-500">${log.time}</div>
                        </td>
                        <td class="p-4 text-right">
                            <div class="text-[10px] font-bold ${log.risk === 0 ? 'text-green-400' : 'text-red-400'}">${log.action}</div>
                            <div class="text-[10px] text-slate-600">Risk: ${log.risk}%</div>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.log("Waiting for server..."); }
        }

        setInterval(refreshLogs, 1000);
        refreshLogs();
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #020c1b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 10px; }
    </style>
</body>
</html>
